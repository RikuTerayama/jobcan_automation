services:
  - type: web
    name: jobcan-automation
    env: docker
    # plan: free 縺ｧ 512MB RAM 竊・Playwright菴ｿ逕ｨ譎ゅ・OOM risk鬮・
    # 謗ｨ螂ｨ: plan: starter (512MB竊・GB+) 縺ｧ螳牙ｮ壼喧
    # 503繧ｨ繝ｩ繝ｼ蟇ｾ遲悶・縺溘ａ縲√ｈ繧贋ｿ晏ｮ育噪縺ｪ險ｭ螳壹↓螟画峩
    plan: free
    buildCommand: docker build -t jobcan-automation .
    startCommand: docker run -p $PORT:$PORT jobcan-automation
    # 雜・ｻｽ驥上・繝ｫ繧ｹ繝√ぉ繝・け・・healthz = <10ms・・
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: ADSENSE_ENABLED
        value: true
      # === Gunicorn 譛驕ｩ蛹冶ｨｭ螳夲ｼ・03繧ｨ繝ｩ繝ｼ蟇ｾ遲厄ｼ・==
      - key: WEB_CONCURRENCY
        value: "1"  # workers謨ｰ・・ree plan 512MB縺ｧ螳牙ｮ壼喧・・
      - key: WEB_THREADS
        value: "1"  # 繧ｹ繝ｬ繝・ラ謨ｰ・医Γ繝｢繝ｪ遽邏・ｼ・
      - key: WEB_TIMEOUT
        value: "180"  # 繧ｿ繧､繝繧｢繧ｦ繝・蛻・ｼ・obcan蜃ｦ逅・畑・・
      - key: WEB_GRACEFUL_TIMEOUT
        value: "30"
      - key: WEB_KEEPALIVE
        value: "5"
      - key: WEB_MAX_REQUESTS
        value: "500"  # 繝｡繝｢繝ｪ繝ｪ繝ｼ繧ｯ蟇ｾ遲厄ｼ・00-500縺ｮ遽・峇縺ｧ隱ｿ謨ｴ蜿ｯ閭ｽ縲＾OM鬆ｻ蠎ｦ谺｡隨ｬ縺ｧ300-400縺ｫ荳九￡繧具ｼ・
      - key: WEB_MAX_REQUESTS_JITTER
        value: "50"  # max-requests縺ｮ10%遞句ｺｦ縺檎岼螳会ｼ・0-50縺ｮ遽・峇縺ｧ隱ｿ謨ｴ蜿ｯ閭ｽ・・ # max-requests縺ｮ10%遞句ｺｦ縺檎岼螳・
      - key: WEB_LOG_LEVEL
        value: "warning"  # P0-P1: 繝｡繝｢繝ｪ譛驕ｩ蛹悶・縺溘ａwarning縺ｫ螟画峩・・nfo縺ｯ繝弱う繧ｺ縺悟､壹＞・・
      # === 繝｡繝｢繝ｪ蛻ｶ髯撰ｼ・OM髦ｲ豁｢・・==
      # P0-4: 髢ｾ蛟､縺ｮ謨ｴ蜷域ｧ繧剃ｿｮ豁｣・・ARNING < LIMIT・・
      - key: MEMORY_LIMIT_MB
        value: "450"  # OOM蜑阪↓隴ｦ蜻・
      - key: MEMORY_WARNING_MB
        value: "400"  # LIMIT繧医ｊ蟆上＆縺・､縺ｫ險ｭ螳・
      # === 蜷梧凾螳溯｡悟宛髯撰ｼ・03繧ｨ繝ｩ繝ｼ蟇ｾ遲厄ｼ・==
      - key: MAX_ACTIVE_SESSIONS
        value: "1"  # 蜷梧凾謗･邯壽焚蛻ｶ髯撰ｼ・ree plan 512MB・・
      - key: MAX_QUEUE_SIZE
        value: "3"  # Free plan guardrail: short in-memory queue for Playwright work
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: PDF_LOCK_MAX_FILE_SIZE_MB
        value: "20"
      - key: AMAZON_ASSOCIATE_TAG
        sync: false
