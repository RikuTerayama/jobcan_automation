{% set seo_link_hub_path = request.path|default('/') if request is defined and request else '/' %}
{% if seo_link_hub_path in ['/', '/tools'] %}
<section class="seo-link-hub{% if seo_link_hub_class %} {{ seo_link_hub_class }}{% endif %}" aria-labelledby="seo-link-hub-heading">
    <h2 id="seo-link-hub-heading">必要なページだけを確認</h2>
    <div class="seo-link-hub__grid{% if seo_link_hub_grid_class %} {{ seo_link_hub_grid_class }}{% endif %}">
        <a class="seo-link-hub__card" href="/autofill">
            <strong>Jobcan AutoFill</strong>
            <span>Excelの勤怠データを使って、Jobcan入力を補助するメインツールです。</span>
        </a>
        <a class="seo-link-hub__card" href="/tools/pdf">
            <strong>PDFツール</strong>
            <span>PDFの結合、分割、ページ抽出、圧縮、パスワード付与を扱えます。</span>
        </a>
        <a class="seo-link-hub__card" href="/faq">
            <strong>FAQ</strong>
            <span>使い方、データの扱い、保護済みPDFの扱いを確認できます。</span>
        </a>
    </div>
</section>
{% endif %}
